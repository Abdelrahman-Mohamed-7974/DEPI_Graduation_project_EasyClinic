org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Djava.net.preferIPv4Stack=true
# Fail fast instead of hanging forever if a Maven download stalls.
systemProp.http.connectionTimeout=30000
systemProp.http.socketTimeout=60000
android.useAndroidX=true
android.enableJetifier=true
